<!DOCTYPE html>
<html>
<head>
  <title>LDP Vault</title>
  <style>
    body { width: 300px; font-family: sans-serif; padding: 15px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
    .logo { width: 24px; height: 24px; }
    .item { padding: 10px; border: 1px solid #eee; border-radius: 4px; margin-bottom: 8px; cursor: pointer; }
    .item:hover { background: #f8f9fc; border-color: #175ddc; }
    .name { font-weight: bold; }
    .user { font-size: 12px; color: #666; }
    .btn { background: #175ddc; color: white; border: none; padding: 8px; width: 100%; border-radius: 4px; cursor: pointer; }
    .status { font-size: 11px; text-align: center; margin-top: 10px; color: #999; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" class="logo" />
    <strong>LDP Logistics Vault</strong>
  </div>
  <div id="items-list">
    <p class="status">Searching for credentials...</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
