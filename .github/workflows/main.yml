name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ldp_bitwarden_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      # Backend CI
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Prisma Generate
        run: |
          cd backend
          npx prisma generate

      # Frontend CI
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      # Extension CI
      - name: Check Extension Manifest
        run: |
          if [ ! -f extension/manifest.json ]; then
            echo "Extension manifest missing!"
            exit 1
          fi

      # Docker Build (Optional: Only if secrets are set)
      - name: Build Docker Images
        run: |
          docker build -t ldp-backend ./backend
          docker build -t ldp-frontend ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH & deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /home/ldpbitlooker/Bit-looker
            git config --global --add safe.directory /home/ldpbitlooker/Bit-looker
            git pull origin main
            docker compose build --no-cache
            docker compose up -d --force-recreate
            sleep 5
            docker compose exec -T backend npx prisma db push
