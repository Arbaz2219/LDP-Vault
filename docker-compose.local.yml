services:
  db:
    image: postgres:15-alpine
    container_name: ldp_vault_db_local
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ldp_vault}
    ports:
      - "5432:5432"
    volumes:
      - ldp_vault_postgres_local:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ldp_vault_postgres_local: