version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ldp_bitwarden_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ldp_bitwarden
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: ldp_bitwarden_backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/ldp_bitwarden"
      JWT_SECRET: "your-super-secret-key"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ldp_bitwarden_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
